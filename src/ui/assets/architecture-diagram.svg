<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="760" viewBox="0 0 1600 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">bangs.to architecture diagram</title>
  <desc id="desc">High-level architecture showing the browser runtime, service worker redirect flow, same-origin handlers, local storage, and optional suggestion provider path.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08111d"/>
      <stop offset="0.52" stop-color="#0b1828"/>
      <stop offset="1" stop-color="#13253d"/>
    </linearGradient>
    <linearGradient id="logoBg" x1="78" y1="70" x2="146" y2="138" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f2740"/>
      <stop offset="0.56" stop-color="#16324f"/>
      <stop offset="1" stop-color="#1d4f7a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020817" flood-opacity="0.34"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#020817" flood-opacity="0.22"/>
    </filter>
    <marker id="arrow" viewBox="0 0 14 14" refX="11.5" refY="7" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1L12 7L1 13V1Z" fill="#90A7C2"/>
    </marker>
    <marker id="arrowBright" viewBox="0 0 14 14" refX="11.5" refY="7" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1L12 7L1 13V1Z" fill="#34D399"/>
    </marker>
    <style>
      .label { fill: #C6D4E5; font: 500 18px 'Georgia', serif; }
      .title { fill: #F8FBFF; font: 700 42px 'Outfit', 'Segoe UI', sans-serif; letter-spacing: -0.04em; }
      .subtitle { fill: #8FA7C2; font: 500 18px 'Work Sans', 'Segoe UI', sans-serif; }
      .zone { fill: rgba(255,255,255,0.04); stroke: rgba(148,163,184,0.18); stroke-width: 1.5; rx: 30; }
      .box { fill: rgba(17,32,53,0.92); stroke: #2B95D6; stroke-width: 2; rx: 18; }
      .boxMuted { fill: rgba(24,39,63,0.78); stroke: rgba(148,163,184,0.38); stroke-width: 1.5; rx: 18; }
      .boxSuccess { fill: #0FA77A; stroke: #34D399; stroke-width: 2; rx: 18; }
      .boxExternal { fill: rgba(14,116,110,0.12); stroke: rgba(45,212,191,0.62); stroke-width: 1.5; rx: 18; }
      .diamond { fill: rgba(19,36,60,0.98); stroke: #2B95D6; stroke-width: 2; }
      .diamondMuted { fill: rgba(24,39,63,0.88); stroke: rgba(148,163,184,0.38); stroke-width: 1.5; }
      .boxTitle { fill: #F8FBFF; font: 600 22px 'Outfit', 'Segoe UI', sans-serif; text-anchor: middle; }
      .boxBody { fill: #AFC1D6; font: 500 16px 'Work Sans', 'Segoe UI', sans-serif; text-anchor: middle; }
      .mini { fill: #8FA7C2; font: 600 15px 'Work Sans', 'Segoe UI', sans-serif; text-anchor: middle; }
      .path { fill: none; stroke: #90A7C2; stroke-width: 2.5; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .pathBright { fill: none; stroke: #34D399; stroke-width: 2.8; marker-end: url(#arrowBright); stroke-linecap: round; stroke-linejoin: round; }
      .pathSoft { fill: none; stroke: rgba(148,163,184,0.55); stroke-width: 2; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .flowLabel { fill: #D5E0EC; font: 500 16px 'Work Sans', 'Segoe UI', sans-serif; }
      .flowLabelMuted { fill: #8FA7C2; font: 500 15px 'Work Sans', 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <rect width="1600" height="760" fill="url(#bg)"/>
  <rect x="1" y="1" width="1598" height="758" stroke="rgba(43,149,214,0.24)" stroke-width="2"/>

  <g filter="url(#softShadow)">
    <rect x="58" y="52" width="108" height="108" rx="28" fill="url(#logoBg)" stroke="#0E5FA8" stroke-opacity="0.58" stroke-width="3"/>
    <path fill="#F8FBFF" d="M86.8 111.7c-4.6 3.3-2.9 10.6 2.8 11.5l67.1 9.7-28.3 91.9c-1.9 6.1 5 11 10.2 7.2l82-60.4 39.1 59.3c3.6 5.5 12.1 3.2 12.4-3.3l20.1-243.7c0.4-5.8-6.1-9.5-10.9-6.1L86.8 111.7Z" transform="scale(0.38) translate(70 104)"/>
    <path fill="#EDF8FF" opacity="0.75" d="M233.6 125.5 285.1 181.4 305.2 87.8 199.6 152.2Z"/>
    <rect x="121" y="86" width="18" height="56" rx="9" transform="rotate(5.5 121 86)" fill="#fff"/>
    <circle cx="107" cy="135" r="9.5" fill="#fff"/>
  </g>

  <text x="196" y="88" class="title">bangs.to architecture</text>
  <text x="196" y="120" class="subtitle">local-first redirects in the browser, same-origin helpers only where browsers require them</text>

  <g filter="url(#cardShadow)">
    <rect x="28" y="286" width="150" height="74" class="box"/>
    <text x="103" y="319" class="boxTitle" font-size="18">address bar</text>
    <text x="103" y="343" class="boxBody">/?q=!gh react</text>
  </g>

  <rect x="204" y="174" width="680" height="436" class="zone"/>
  <text x="518" y="204" class="label">browser runtime</text>

  <rect x="912" y="174" width="488" height="436" class="zone"/>
  <text x="1142" y="204" class="label">same-origin app surface</text>

  <rect x="1430" y="250" width="136" height="74" class="boxExternal"/>
  <text x="1498" y="283" class="boxTitle" font-size="18">destination</text>
  <text x="1498" y="307" class="boxBody">GitHub / MDN / etc.</text>

  <rect x="1420" y="514" width="150" height="78" class="boxExternal"/>
  <text x="1495" y="547" class="boxTitle" font-size="18">upstream suggest</text>
  <text x="1495" y="571" class="boxBody">DDG / Google / Bing</text>

  <g filter="url(#cardShadow)">
    <polygon points="294,246 364,316 294,386 224,316" class="diamond"/>
    <text x="294" y="310" class="boxTitle" font-size="19">service worker</text>
    <text x="294" y="334" class="boxBody">already controlling?</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="420" y="274" width="210" height="84" class="box"/>
    <text x="525" y="308" class="boxTitle" font-size="20">redirect engine</text>
    <text x="525" y="332" class="boxBody">redirect.ts + lookupBang()</text>
    <text x="525" y="352" class="boxBody">14k+ generated bang map</text>
  </g>

  <g filter="url(#cardShadow)">
    <polygon points="716,246 786,316 716,386 646,316" class="diamond"/>
    <text x="716" y="310" class="boxTitle" font-size="19">bang match?</text>
    <text x="716" y="334" class="boxBody">custom first, built-ins next</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="980" y="232" width="178" height="90" class="boxSuccess"/>
    <text x="1069" y="270" class="boxTitle" font-size="21">302 redirect</text>
    <text x="1069" y="295" class="boxBody" fill="#F0FFFA">local-first fast path</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="438" y="436" width="244" height="92" class="boxMuted"/>
    <text x="560" y="470" class="boxTitle" font-size="20">Astro shell + UI</text>
    <text x="560" y="495" class="boxBody">TrySearch, settings, bangs,</text>
    <text x="560" y="516" class="boxBody">stats, FAQ, contact pages</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="224" y="456" width="164" height="74" class="boxMuted"/>
    <text x="306" y="488" class="boxTitle" font-size="18">cold-start bridge</text>
    <text x="306" y="512" class="boxBody">register SW +</text>
    <text x="306" y="532" class="boxBody">message redirect fallback</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="944" y="414" width="196" height="88" class="boxMuted"/>
    <text x="1042" y="447" class="boxTitle" font-size="20">static build output</text>
    <text x="1042" y="472" class="boxBody">dist HTML, JS, CSS, icons</text>
    <text x="1042" y="493" class="boxBody">served by Pages or Node</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="1170" y="408" width="186" height="100" class="box"/>
    <text x="1263" y="442" class="boxTitle" font-size="20">/suggest +</text>
    <text x="1263" y="467" class="boxTitle" font-size="20">/opensearch.xml</text>
    <text x="1263" y="492" class="boxBody">server handlers for the</text>
    <text x="1263" y="513" class="boxBody">browser features SW cannot own</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="456" y="562" width="302" height="92" class="boxMuted"/>
    <text x="607" y="596" class="boxTitle" font-size="20">device-local state</text>
    <text x="607" y="621" class="boxBody">IndexedDB settings + custom bangs</text>
    <text x="607" y="642" class="boxBody">frecency snapshot + query memory</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="980" y="546" width="264" height="86" class="boxMuted"/>
    <text x="1112" y="579" class="boxTitle" font-size="19">suggest context</text>
    <text x="1112" y="604" class="boxBody">cookie-backed provider choice,</text>
    <text x="1112" y="625" class="boxBody">top bangs, and same-origin rewrites</text>
  </g>

  <path d="M178 323H214" class="path"/>
  <path d="M364 316H420" class="path"/>
  <path d="M630 316H646" class="path"/>
  <path d="M786 316H980" class="pathBright"/>
  <path d="M1158 277H1430" class="pathBright"/>
  <path d="M294 386V434H294V456" class="pathSoft"/>
  <path d="M388 493H438" class="pathSoft"/>
  <path d="M682 482H944" class="pathSoft"/>
  <path d="M1140 458H1170" class="pathSoft"/>
  <path d="M1263 508V546" class="pathSoft"/>
  <path d="M716 386V448H682" class="pathSoft"/>
  <path d="M560 528V562" class="pathSoft"/>
  <path d="M606 562V530" class="pathSoft"/>
  <path d="M757 608H980" class="pathSoft"/>
  <path d="M1244 589H1420" class="pathSoft"/>

  <text x="388" y="262" class="flowLabel">yes</text>
  <text x="818" y="300" class="flowLabel" fill="#8DF0C7">yes</text>
  <text x="802" y="412" class="flowLabelMuted">no bang / normal page route</text>
  <text x="234" y="424" class="flowLabelMuted">first visit / no controller yet</text>
  <text x="1178" y="256" class="flowLabel" fill="#8DF0C7">to destination</text>
  <text x="1300" y="537" class="flowLabelMuted">optional upstream fetch</text>

  <path d="M108 392C108 462 108 528 224 552" class="pathSoft"/>
  <text x="48" y="432" class="flowLabelMuted">browser suggestion dropdown</text>

  <path d="M178 552H980" class="pathSoft"/>

  <g opacity="0.94">
    <rect x="38" y="666" width="1524" height="56" rx="18" fill="rgba(255,255,255,0.04)" stroke="rgba(148,163,184,0.16)"/>
    <text x="70" y="700" class="subtitle" font-size="16">codegen → generated bang maps → esbuild + Astro → dist → Cloudflare Pages or self-hosted Node runtime</text>
    <text x="1172" y="700" class="subtitle" font-size="16">core redirect path stays local after SW install</text>
  </g>
</svg>
