            stroke-width="34"
            stroke-linejoin="round"
        />
        <circle
            cx="4"
            cy="264"
            r="62"
            fill="#ffffff"
            stroke="#111111"
            stroke-width="34"
        />
        <path
            d="M -34 -278 L 24 -278 L 0 92"
            fill="none"
            stroke="#ffef5a"
            stroke-width="20"
            stroke-linecap="round"
            opacity="0.9"
        />
