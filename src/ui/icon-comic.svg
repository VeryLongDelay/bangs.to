<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg"
    role="img" aria-labelledby="title desc">
    <title id="title">Comic explosion exclamation icon</title>
    <desc id="desc">A bold exclamation mark surrounded by a comic book style explosion burst.</desc>

    <defs>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="18" dy="22" stdDeviation="0" flood-color="#111111"
                flood-opacity="0.95" />
        </filter>

        <radialGradient id="burstGradient" cx="50%" cy="44%" r="65%">
            <stop offset="0%" stop-color="#fff36a" />
            <stop offset="54%" stop-color="#ffcf24" />
            <stop offset="100%" stop-color="#ff6b22" />
        </radialGradient>

        <pattern id="halftone" width="34" height="34" patternUnits="userSpaceOnUse">
            <circle cx="8" cy="8" r="5" fill="#b91c1c" opacity="0.18" />
            <circle cx="25" cy="25" r="4" fill="#b91c1c" opacity="0.14" />
        </pattern>
    </defs>

    <rect width="1024" height="1024" rx="220" fill="#2f4cff" />

    <g transform="translate(512 512)" filter="url(#shadow)">
        <path
            d="M 0 -470
         L 60 -306 L 166 -426 L 150 -250 L 310 -330
         L 230 -170 L 420 -188 L 270 -70 L 470 0
         L 270 70 L 420 188 L 230 170 L 310 330
         L 150 250 L 166 426 L 60 306 L 0 470
         L -60 306 L -166 426 L -150 250 L -310 330
         L -230 170 L -420 188 L -270 70 L -470 0
         L -270 -70 L -420 -188 L -230 -170 L -310 -330
         L -150 -250 L -166 -426 L -60 -306 Z"
            fill="url(#burstGradient)"
            stroke="#111111"
            stroke-width="28"
            stroke-linejoin="round"
        />
        <path
            d="M 0 -470
         L 60 -306 L 166 -426 L 150 -250 L 310 -330
         L 230 -170 L 420 -188 L 270 -70 L 470 0
         L 270 70 L 420 188 L 230 170 L 310 330
         L 150 250 L 166 426 L 60 306 L 0 470
         L -60 306 L -166 426 L -150 250 L -310 330
         L -230 170 L -420 188 L -270 70 L -470 0
         L -270 -70 L -420 -188 L -230 -170 L -310 -330
         L -150 -250 L -166 -426 L -60 -306 Z"
            fill="url(#halftone)"
            opacity="0.85"
        />
    </g>

    <g transform="translate(512 512)">
        <path
            d="M -72 -258
         Q -78 -314 -26 -326
         L 34 -326
         Q 86 -314 80 -258
         L 48 104
